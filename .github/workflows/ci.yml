name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: pytest

      - name: Prepare API smoke test database
        run: python manage.py migrate --noinput

      - name: Start Django API server
        run: |
          python manage.py runserver 127.0.0.1:8000 > django.log 2>&1 &
          echo $! > django.pid
          for i in {1..30}; do
            if curl --fail --silent --request OPTIONS http://127.0.0.1:8000/api/register/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat django.log
          exit 1

      - name: Run Postman smoke tests
        run: |
          npx --yes newman@6.2.1 run postman/quizly-auth.postman_collection.json \
            --env-var baseUrl=http://127.0.0.1:8000

      - name: Check size limits
        run: python scripts/check_size_limits.py
