[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["."]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-rxX",
    "--cov=.",
    "--cov-branch",
    "--cov-report=term-missing",
]

[tool.coverage.run]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/test_*.py",
    "*/__init__.py",
    "manage.py",
    "config/asgi.py",
    "config/wsgi.py",
]

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 88
target-version = "py313"
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "DJ",
    "UP",
    "T20",
    "PLR0915",
    "D101",
]
ignore = [
    "DJ001",
]

[tool.ruff.lint.pylint]
max-statements = 14

[tool.ruff.lint.per-file-ignores]
"quizzes_app/prompts.py" = ["E501"]
"**/test_*.py" = ["PLR0915"]
"**/*_tests.py" = ["PLR0915"]
"**/tests.py" = ["PLR0915"]
"**/apps.py" = ["D101"]
"tests/scripts/check_size_limits.py" = ["T201"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "auto"
